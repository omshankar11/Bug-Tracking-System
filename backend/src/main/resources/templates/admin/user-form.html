<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>New User | Bug Tracking System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<header>
    <h1>Bug Tracking System</h1>
    <nav>
        <a th:href="@{/bugs}">Bugs</a>
        <a th:href="@{/bugs/new}">Create Bug</a>
        <a th:href="@{/admin/projects}">Projects</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/logout}">Logout</a>
    </nav>
</header>
<section class="main-content">
    <h2>Create User</h2>
    <form th:action="@{/admin/users}" th:object="${user}" method="post">
        <label for="username">Username</label>
        <input id="username" th:field="*{username}" required />
        <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email" required />
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label for="password">Password</label>
        <input id="password" th:field="*{password}" type="password" required />
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <button type="submit">Create User</button>
    </form>
</section>
</body>
</html>
