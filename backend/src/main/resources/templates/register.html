<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Register | Bug Tracking System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<header>
    <h1>Bug Tracking System</h1>
</header>
<section class="main-content">
    <h2>Register</h2>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <label for="username">Username</label>
        <input id="username" th:field="*{username}" type="text" required />
        <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email" required />
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label for="password">Password</label>
        <input id="password" th:field="*{password}" type="password" required />
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a th:href="@{/login}">Login</a>.</p>
</section>
</body>
</html>
