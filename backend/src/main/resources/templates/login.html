<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Login | Bug Tracking System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<header>
    <h1>Bug Tracking System</h1>
</header>
<section class="main-content">
    <h2>Login</h2>
    <div th:if="${param.error}" class="alert">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert">You have been logged out.</div>
    <form method="post" action="/login">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Login</button>
    </form>
    <p>New user? <a th:href="@{/register}">Register here</a>.</p>
</section>
</body>
</html>
